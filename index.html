<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Elements Demo</title>
</head>
<body>
    <h1>Welcome to HTML Elements</h1>
    
    <p><em>This is my first web page</em></p>
    
    <p>This is a regular paragraph with some <strong>bold text</strong> and <em>emphasized text</em>.</p>
    
    <p>You can also use <b>bold</b>, <i>italic</i>, and <u>underlined</u> text.</p>
    
</body>
</html>
